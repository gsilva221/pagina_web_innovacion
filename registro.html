<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexovocacional | Registro de Estudiante</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/registro.css">
</head>
<body>
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-logo">
        <a href="index.html">Nexovocacional</a>
      </div>
      <nav class="navbar-menu">
        <a href="index.html#inicio" class="nav-link">Inicio</a>
        <a href="index.html#beneficios" class="nav-link">Beneficios</a>
        <a href="index.html#impacto" class="nav-link">Impacto</a>
        <a href="index.html#contacto" class="nav-link">Contacto</a>
      </nav>
      <div class="navbar-account">
        <button id="accountBtn" class="account-btn" title="Mi cuenta">👤</button>
      </div>
    </div>
  </header>

  <main class="registro-container">
    <div class="registro-wrapper">
      <div class="registro-header">
        <h1>Completa tu perfil</h1>
        <p>Cuéntanos sobre ti para ofrecerte una experiencia vocacional personalizada</p>
      </div>

      <form id="registroForm" class="registro-form">
        <!-- Información Personal -->
        <fieldset class="form-section">
          <legend>Información Personal</legend>
          
          <div class="form-group">
            <label for="nombre">Nombre completo *</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Correo electrónico *</label>
              <input type="email" id="email" name="email" placeholder="tunombre@correo.com" required>
            </div>
            <div class="form-group">
              <label for="telefono">Teléfono o WhatsApp *</label>
              <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="rut">RUT (sin puntos ni guión) *</label>
              <input type="text" id="rut" name="rut" placeholder="12345678" required>
            </div>
            <div class="form-group">
              <label for="fecha_nacimiento">Fecha de nacimiento *</label>
              <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
            </div>
          </div>
        </fieldset>

        <!-- Información Académica -->
        <fieldset class="form-section">
          <legend>Información Académica</legend>
          
          <div class="form-row">
            <div class="form-group">
              <label for="nivel">Nivel educativo *</label>
              <select id="nivel" name="nivel" required>
                <option value="">Selecciona tu nivel</option>
                <option value="7mo_8vo">7mo a 8vo básico</option>
                <option value="1ro_2do_medio">1ro a 2do medio</option>
                <option value="3ro_4to_medio">3ro a 4to medio</option>
                <option value="egresado">Egresado de educación media</option>
                <option value="universitario">Estudiante universitario</option>
                <option value="profesional">Profesional trabajando</option>
              </select>
            </div>
            <div class="form-group">
              <label for="establecimiento">Establecimiento educativo *</label>
              <input type="text" id="establecimiento" name="establecimiento" placeholder="Nombre de tu colegio o universidad" required>
            </div>
          </div>

          <div class="form-group">
            <label for="promedio">Promedio académico (GPA)</label>
            <input type="number" id="promedio" name="promedio" min="1" max="7" step="0.1" placeholder="Ej: 6.5">
          </div>
        </fieldset>

        <!-- Intereses y Fortalezas -->
        <fieldset class="form-section">
          <legend>Intereses y Fortalezas</legend>
          
          <div class="form-group">
            <label>Área de interés principal *</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="radio" name="area_interes" value="tecnologia" required>
                <span>Tecnología e Informática</span>
              </label>
              <label class="checkbox-label">
                <input type="radio" name="area_interes" value="salud">
                <span>Salud y Ciencias Médicas</span>
              </label>
              <label class="checkbox-label">
                <input type="radio" name="area_interes" value="negocios">
                <span>Negocios y Administración</span>
              </label>
              <label class="checkbox-label">
                <input type="radio" name="area_interes" value="ingenieria">
                <span>Ingeniería</span>
              </label>
              <label class="checkbox-label">
                <input type="radio" name="area_interes" value="artes">
                <span>Artes y Diseño</span>
              </label>
              <label class="checkbox-label">
                <input type="radio" name="area_interes" value="educacion">
                <span>Educación y Pedagogía</span>
              </label>
              <label class="checkbox-label">
                <input type="radio" name="area_interes" value="derecho">
                <span>Derecho y Ciencias Sociales</span>
              </label>
              <label class="checkbox-label">
                <input type="radio" name="area_interes" value="otro">
                <span>Otro</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label for="habilidades">Cuéntanos sobre tus principales habilidades</label>
            <textarea id="habilidades" name="habilidades" placeholder="Ej: Liderazgo, creatividad, análisis, trabajo en equipo..." rows="4"></textarea>
          </div>
        </fieldset>

        <!-- Información de Contacto y Consentimiento -->
        <fieldset class="form-section">
          <legend>Consentimiento</legend>
          
          <label class="checkbox-label full">
            <input type="checkbox" name="privacidad" required>
            <span>Autorizo a Nexovocacional a procesar mis datos personales según la política de privacidad *</span>
          </label>
          
          <label class="checkbox-label full">
            <input type="checkbox" name="contacto">
            <span>Deseo recibir actualizaciones y novedades sobre servicios de Nexovocacional</span>
          </label>
        </fieldset>

        <button type="submit" class="submit-btn">Completar Registro</button>
        <p class="form-info">* Campos obligatorios</p>
      </form>
    </div>
  </main>

  <script src="js/registro.js"></script>
</body>
</html>
